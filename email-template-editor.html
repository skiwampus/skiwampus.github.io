<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Template Editor</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 360px;
      min-width: 360px;
      background: #fff;
      border-right: 1px solid #dde1e7;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px 20px 14px;
      background: #1c1c2e;
      color: #fff;
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .sidebar-header p {
      font-size: 11px;
      color: #8888aa;
      margin-top: 3px;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .sidebar-footer {
      padding: 14px;
      border-top: 1px solid #dde1e7;
      background: #fff;
      flex-shrink: 0;
    }

    /* ── Sections ── */
    .section {
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .section-header {
      padding: 8px 12px;
      background: #f7f8fa;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b7280;
      border-bottom: 1px solid #e4e7ec;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .section-header .chevron {
      font-size: 10px;
      transition: transform 0.15s;
    }

    .section.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .section-body {
      padding: 12px;
    }

    .section.collapsed .section-body {
      display: none;
    }

    /* ── Form controls ── */
    .field {
      margin-bottom: 10px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 13px;
      color: #111827;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    /* Color row */
    .color-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .color-swatch-wrap {
      position: relative;
      width: 34px;
      height: 30px;
      border-radius: 5px;
      border: 1px solid #d1d5db;
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
    }

    input[type="color"] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .color-row .hex-input {
      flex: 1;
    }

    /* Toggle group */
    .toggle-group {
      display: flex;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      overflow: hidden;
    }

    .toggle-btn {
      flex: 1;
      padding: 6px 8px;
      background: #fff;
      border: none;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      color: #6b7280;
      transition: background 0.12s, color 0.12s;
    }

    .toggle-btn:not(:last-child) {
      border-right: 1px solid #d1d5db;
    }

    .toggle-btn.active {
      background: #1c1c2e;
      color: #fff;
      font-weight: 700;
    }

    /* Logo upload */
    .logo-upload-area {
      border: 2px dashed #d1d5db;
      border-radius: 6px;
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .logo-upload-area:hover {
      border-color: #6366f1;
      background: #f5f3ff;
    }

    .logo-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #logo-thumb {
      max-height: 44px;
      max-width: 160px;
      margin: 0 auto 6px;
      display: block;
      object-fit: contain;
    }

    .upload-hint {
      font-size: 10px;
      color: #9ca3af;
      pointer-events: none;
    }

    /* Export button */
    .export-btn {
      width: 100%;
      padding: 10px;
      background: #1c1c2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }

    .export-btn:hover {
      background: #2e2e4e;
    }

    .export-btn:active {
      transform: scale(0.98);
    }

    /* ── Preview panel ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .preview-toolbar {
      padding: 9px 20px;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #6b7280;
      flex-shrink: 0;
    }

    .preview-toolbar .brand-pill {
      background: #f0f0ff;
      color: #4338ca;
      border: 1px solid #c7d2fe;
      border-radius: 20px;
      padding: 1px 9px;
      font-size: 11px;
      font-weight: 700;
    }

    .preview-toolbar .spacer {
      flex: 1;
    }

    .preview-wrapper {
      flex: 1;
      overflow: auto;
      background: #c8cad0;
      display: flex;
      justify-content: center;
      padding: 24px 20px;
    }

    #preview-frame {
      width: 640px;
      min-width: 640px;
      height: 1px;
      border: none;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
      border-radius: 2px;
      transition: height 0.1s;
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Email Template Editor</h1>
        <p>Customize branding and export</p>
      </div>

      <div class="sidebar-body">

        <!-- Brand -->
        <div class="section" id="sec-brand">
          <div class="section-header" onclick="toggleSection('sec-brand')">Brand Name <span class="chevron">▾</span>
          </div>
          <div class="section-body">
            <div class="field">
              <label for="brand-name">Brand Name</label>
              <input type="text" id="brand-name" value="WKND" placeholder="Enter brand name">
            </div>
          </div>
        </div>

        <!-- Logo -->
        <div class="section" id="sec-logo">
          <div class="section-header" onclick="toggleSection('sec-logo')">Logo <span class="chevron">▾</span></div>
          <div class="section-body">
            <div class="field">
              <label>Logo Image (base64 encoded on upload)</label>
              <div class="logo-upload-area" id="logo-drop">
                <img id="logo-thumb" src="" alt="Logo preview">
                <p class="upload-hint">Click to upload a new logo image</p>
                <input type="file" id="logo-upload" accept="image/*">
              </div>
            </div>
            <div class="field">
              <label>Logo Height: <span id="logo-height-val">45</span>px</label>
              <input type="range" id="logo-height" min="20" max="120" value="45" style="width:100%; accent-color:#1c1c2e;">
            </div>
            <div class="field">
              <label>Logo Top &amp; Bottom Margin: <span id="logo-margin-val">40</span>px</label>
              <input type="range" id="logo-margin" min="0" max="80" value="40" style="width:100%; accent-color:#1c1c2e;">
            </div>
            <div class="field">
              <label>Logo Container Background</label>
              <div class="color-row">
                <div class="color-swatch-wrap"><input type="color" id="logo-bg-color" value="#ffffff"></div>
                <input type="text" id="logo-bg-hex" class="hex-input" value="#ffffff" maxlength="7">
              </div>
            </div>
          </div>
        </div>

        <!-- CTA Button -->
        <div class="section" id="sec-cta">
          <div class="section-header" onclick="toggleSection('sec-cta')">CTA Button <span class="chevron">▾</span></div>
          <div class="section-body">
            <div class="field">
              <label>Corner Shape</label>
              <div class="toggle-group">
                <button class="toggle-btn active" data-radius="0">Square (0px)</button>
                <button class="toggle-btn" data-radius="25">Rounded (25px)</button>
              </div>
            </div>
            <div class="field">
              <label>Background Color</label>
              <div class="color-row">
                <div class="color-swatch-wrap"><input type="color" id="cta-bg-color" value="#ffffff"></div>
                <input type="text" id="cta-bg-hex" class="hex-input" value="#ffffff" maxlength="7">
              </div>
            </div>
            <div class="field">
              <label>Text Color</label>
              <div class="color-row">
                <div class="color-swatch-wrap"><input type="color" id="cta-text-color" value="#000000"></div>
                <input type="text" id="cta-text-hex" class="hex-input" value="#000000" maxlength="7">
              </div>
            </div>
            <div class="field">
              <label>Border Color</label>
              <div class="color-row">
                <div class="color-swatch-wrap"><input type="color" id="cta-border-color" value="#000000"></div>
                <input type="text" id="cta-border-hex" class="hex-input" value="#000000" maxlength="7">
              </div>
            </div>
            <div class="field">
              <label>Border Width (px)</label>
              <input type="number" id="cta-border-width" value="2" min="0" max="20" style="width:80px;">
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="section" id="sec-footer">
          <div class="section-header" onclick="toggleSection('sec-footer')">Footer <span class="chevron">▾</span></div>
          <div class="section-body">
            <div class="field">
              <label>Background Color</label>
              <div class="color-row">
                <div class="color-swatch-wrap"><input type="color" id="footer-bg-color" value="#000000"></div>
                <input type="text" id="footer-bg-hex" class="hex-input" value="#000000" maxlength="7">
              </div>
            </div>
            <div class="field">
              <label>Text &amp; Link Color</label>
              <div class="color-row">
                <div class="color-swatch-wrap"><input type="color" id="footer-text-color" value="#ffffff"></div>
                <input type="text" id="footer-text-hex" class="hex-input" value="#ffffff" maxlength="7">
              </div>
            </div>
          </div>
        </div>

      </div><!-- /sidebar-body -->

      <div class="sidebar-footer">
        <button class="export-btn" id="export-btn">&#8595; Export template-[brand].html</button>
      </div>
    </aside>

    <!-- ── Preview ── -->
    <main class="preview-panel">
      <div class="preview-toolbar">
        Live Preview &mdash;
        <span class="brand-pill" id="preview-brand-label">WKND</span>
        <span class="spacer"></span>
        <span>600px email width</span>
      </div>
      <div class="preview-wrapper">
        <iframe id="preview-frame" title="Template Preview"></iframe>
      </div>
    </main>

  </div><!-- /app -->

    // ─────────────────────────────────────────────────────────────────────────────
    // State
    // ─────────────────────────────────────────────────────────────────────────────
    const state = {
      brandName: 'WKND',
      logoSrc: null,
      logoHeight: 45,
      logoMargin: 40,
      logoBgColor: '#ffffff',
      ctaBgColor: '#ffffff',
      ctaTextColor: '#000000',
      ctaBorderColor: '#000000',
      ctaBorderWidth: 2,
      ctaBorderRadius: 0,
      footerBgColor: '#000000',
      footerTextColor: '#ffffff',
    };

    // Extract original logo src from template
    (function initLogoThumb() {
      const parser = new DOMParser();
      const doc = parser.parseFromString(TEMPLATE_HTML, 'text/html');
      const logo = doc.querySelector('#logo');
      if (logo) {
        state.logoSrc = logo.getAttribute('src');
        document.getElementById('logo-thumb').src = state.logoSrc;
      }
    })();

    // ─────────────────────────────────────────────────────────────────────────────
    // Build modified HTML
    // ─────────────────────────────────────────────────────────────────────────────
    function buildHTML() {
      const parser = new DOMParser();
      const doc = parser.parseFromString(TEMPLATE_HTML, 'text/html');

      // Brand name
      doc.querySelectorAll('.brand').forEach(el => {
        el.textContent = state.brandName;
      });

      // Logo src
      const logo = doc.querySelector('#logo');
      if (logo && state.logoSrc) {
        logo.setAttribute('src', state.logoSrc);
      }

      // Inject override styles
      const overrideStyle = doc.createElement('style');
      overrideStyle.id = 'brand-overrides';
      overrideStyle.textContent = `
.cta-button {
  background-color: ${state.ctaBgColor} !important;
  color: ${state.ctaTextColor} !important;
  border: ${state.ctaBorderWidth}px solid ${state.ctaBorderColor} !important;
  border-radius: ${state.ctaBorderRadius}px !important;
}
.footer-colors {
  background-color: ${state.footerBgColor} !important;
  color: ${state.footerTextColor} !important;
}
.footer a {
  color: ${state.footerTextColor} !important;
}
.footer p { color: ${state.footerTextColor} !important; }
.logo-container {
  background-color: ${state.logoBgColor} !important;
}
.logo {
  height: ${state.logoHeight}px !important;
  width: auto !important;
  margin-top: ${state.logoMargin}px !important;
  margin-bottom: ${state.logoMargin}px !important;
}
  `.trim();
      doc.head.appendChild(overrideStyle);

      return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // Update preview
    // ─────────────────────────────────────────────────────────────────────────────
    const previewFrame = document.getElementById('preview-frame');

    // Register resize handler once so it isn't re-assigned on every keystroke.
    // Reset to 1px before measuring so the frame's own height doesn't inflate scrollHeight.
    previewFrame.addEventListener('load', () => {
      try {
        previewFrame.style.height = '1px';
        const h = previewFrame.contentDocument.body.scrollHeight;
        previewFrame.style.height = Math.max(800, h) + 'px';
      } catch (e) { }
    });

    function updatePreview() {
      previewFrame.srcdoc = buildHTML();
      document.getElementById('preview-brand-label').textContent = state.brandName || 'WKND';
    }

    // Initial render
    updatePreview();

    // ─────────────────────────────────────────────────────────────────────────────
    // Controls wiring
    // ─────────────────────────────────────────────────────────────────────────────

    // Brand name
    document.getElementById('brand-name').addEventListener('input', e => {
      state.brandName = e.target.value;
      updatePreview();
    });

    // Logo upload
    document.getElementById('logo-upload').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        state.logoSrc = evt.target.result;
        document.getElementById('logo-thumb').src = state.logoSrc;
        updatePreview();
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('logo-height').addEventListener('input', e => {
      state.logoHeight = parseInt(e.target.value, 10);
      document.getElementById('logo-height-val').textContent = state.logoHeight;
      updatePreview();
    });

    document.getElementById('logo-margin').addEventListener('input', e => {
      state.logoMargin = parseInt(e.target.value, 10);
      document.getElementById('logo-margin-val').textContent = state.logoMargin;
      updatePreview();
    });

    // CTA rounded toggle
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.ctaBorderRadius = parseInt(btn.dataset.radius, 10);
        updatePreview();
      });
    });

    // CTA border width
    document.getElementById('cta-border-width').addEventListener('input', e => {
      state.ctaBorderWidth = Math.max(0, parseInt(e.target.value, 10) || 0);
      updatePreview();
    });

    // Color pair helper: syncs color picker ↔ hex text input
    function wireColorPair(colorId, hexId, stateKey) {
      const colorEl = document.getElementById(colorId);
      const hexEl = document.getElementById(hexId);

      colorEl.addEventListener('input', () => {
        hexEl.value = colorEl.value;
        state[stateKey] = colorEl.value;
        updatePreview();
      });

      hexEl.addEventListener('input', () => {
        let val = hexEl.value.trim();
        if (!val.startsWith('#')) val = '#' + val;
        if (/^#[0-9a-fA-F]{6}$/.test(val)) {
          colorEl.value = val;
          state[stateKey] = val;
          updatePreview();
        }
      });
    }

    wireColorPair('logo-bg-color', 'logo-bg-hex', 'logoBgColor');
    wireColorPair('cta-bg-color', 'cta-bg-hex', 'ctaBgColor');
    wireColorPair('cta-text-color', 'cta-text-hex', 'ctaTextColor');
    wireColorPair('cta-border-color', 'cta-border-hex', 'ctaBorderColor');
    wireColorPair('footer-bg-color', 'footer-bg-hex', 'footerBgColor');
    wireColorPair('footer-text-color', 'footer-text-hex', 'footerTextColor');

    // ─────────────────────────────────────────────────────────────────────────────
    // Export
    // ─────────────────────────────────────────────────────────────────────────────
    document.getElementById('export-btn').addEventListener('click', () => {
      const html = buildHTML();
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const safeName = (state.brandName || 'brand')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'brand';
      a.href = url;
      a.download = `template-${safeName}.html`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // ─────────────────────────────────────────────────────────────────────────────
    // Section collapse
    // ─────────────────────────────────────────────────────────────────────────────
    function toggleSection(id) {
      document.getElementById(id).classList.toggle('collapsed');
    }
  </script>
